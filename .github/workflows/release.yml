name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to upload assets to'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Build Electron package
        working-directory: packages/electron
        shell: bash
        run: |
          bun run build:web-assets
          bun run bundle:main
          # Native rebuild fails on some Windows toolchains; log error but continue.
          bun run rebuild:native || {
            echo "::warning::Native rebuild failed, continuing with npmRebuild fallback"
          }
          node ./scripts/package.mjs --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Create release (if not exists)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          fi
          NOTES_FILE=".github/release-notes/${TAG}.md"
          if [[ -f "$NOTES_FILE" ]]; then
            gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" || echo "Release already exists, continuing"
          else
            gh release create "$TAG" --title "$TAG" --notes "" || echo "Release already exists, continuing"
          fi

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          fi

          echo "Tag: $TAG"
          shopt -s nullglob
          for f in packages/electron/dist/Glenker-*; do
            name="$(basename "$f")"
            # Skip unpacked dirs, blockmaps, and latest metadata
            if [[ -d "$f" || "$name" == *.blockmap || "$name" == latest*.yml || "$name" == latest*.json ]]; then
              continue
            fi
            echo "Uploading: $name"
            gh release upload "$TAG" "$f" --clobber
          done
