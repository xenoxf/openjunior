services:
  glenker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glenker
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/glenker:/home/glenker/.config/glenker
      - ./data/opencode/share:/home/glenker/.local/share/opencode
      - ./data/opencode/state:/home/glenker/.local/state/opencode
      - ./data/opencode/config:/home/glenker/.config/opencode
      - ./data/ssh:/home/glenker/.ssh
      - ./workspaces:/home/glenker/workspaces
    environment:
      # Docker binds Glenker to 0.0.0.0 for port mapping, so UI auth is required.
      # Set this before starting, for example:
      #   GLENKER_UI_PASSWORD="$(openssl rand -base64 24)" docker compose up -d
      GLENKER_UI_PASSWORD: ${GLENKER_UI_PASSWORD:?Set GLENKER_UI_PASSWORD before exposing Glenker through Docker}
    # GLENKER_HOST: 0.0.0.0  # Bind address (default in Docker entrypoint: 0.0.0.0)
    # GLENKER_TUNNEL_PROVIDER: cloudflare
    # GLENKER_TUNNEL_MODE: quick  # quick | managed-remote | managed-local
    # GLENKER_TUNNEL_HOSTNAME: app.example.com  # required for managed-remote
    # GLENKER_TUNNEL_TOKEN: your_cloudflare_token  # required for managed-remote
    # GLENKER_TUNNEL_CONFIG: /home/glenker/.cloudflared/config.yml  # optional for managed-local
    # OH_MY_OPENCODE: true # enable oh-my-opencode
    # OPENCODE_HOST: http://172.17.0.1:4096 # Connect to external OpenCode server
    # OPENCODE_SKIP_START: true # skip start opencode
    # GLENKER_OPENCODE_HOSTNAME: 0.0.0.0 # Bind OpenCode to all interfaces
    restart: unless-stopped
