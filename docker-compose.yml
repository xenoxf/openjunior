services:
  openjunior:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openjunior
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/openjunior:/home/openjunior/.config/openjunior
      - ./data/opencode/share:/home/openjunior/.local/share/opencode
      - ./data/opencode/state:/home/openjunior/.local/state/opencode
      - ./data/opencode/config:/home/openjunior/.config/opencode
      - ./data/ssh:/home/openjunior/.ssh
      - ./workspaces:/home/openjunior/workspaces
    environment:
      # Docker binds OpenJunior to 0.0.0.0 for port mapping, so UI auth is required.
      # Set this before starting, for example:
      #   OPENJUNIOR_UI_PASSWORD="$(openssl rand -base64 24)" docker compose up -d
      OPENJUNIOR_UI_PASSWORD: ${OPENJUNIOR_UI_PASSWORD:?Set OPENJUNIOR_UI_PASSWORD before exposing OpenJunior through Docker}
    # OPENJUNIOR_HOST: 0.0.0.0  # Bind address (default in Docker entrypoint: 0.0.0.0)
    # OPENJUNIOR_TUNNEL_PROVIDER: cloudflare
    # OPENJUNIOR_TUNNEL_MODE: quick  # quick | managed-remote | managed-local
    # OPENJUNIOR_TUNNEL_HOSTNAME: app.example.com  # required for managed-remote
    # OPENJUNIOR_TUNNEL_TOKEN: your_cloudflare_token  # required for managed-remote
    # OPENJUNIOR_TUNNEL_CONFIG: /home/openjunior/.cloudflared/config.yml  # optional for managed-local
    # OH_MY_OPENCODE: true # enable oh-my-opencode
    # OPENCODE_HOST: http://172.17.0.1:4096 # Connect to external OpenCode server
    # OPENCODE_SKIP_START: true # skip start opencode
    # OPENJUNIOR_OPENCODE_HOSTNAME: 0.0.0.0 # Bind OpenCode to all interfaces
    restart: unless-stopped
