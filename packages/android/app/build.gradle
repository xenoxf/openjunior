apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace = "dev.glenker.app"
    compileSdk = 35
    defaultConfig {
        applicationId "dev.glenker.app"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 1
        versionName "1.16.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        ndk {
            abiFilters "arm64-v8a"
        }
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    // Single-ABI APK: only arm64-v8a is listed in ndk.abiFilters below, so Gradle
    // produces one universal (single-ABI) APK rather than an ABI-split App Bundle.
    // (AGP 8.x removed `bundle.abi.enable`; a single abiFilter already yields a
    // single-ABI APK.)

    // Keep the .so files (incl. the lildax binary renamed to liblildax.so) as
    // uncompressed, page-aligned entries so the system extracts them to
    // nativeLibraryDir at install time. nativeLibraryDir is the only location
    // on Android 10+ where files may be executed.
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    kotlinOptions {
        jvmTarget = "21"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    buildFeatures {
        buildConfig true
    }
}

repositories {
    google()
    mavenCentral()
    flatDir {
        dirs 'libs'
    }
}

configurations.all {
    resolutionStrategy {
        force "androidx.activity:activity:1.10.1"
        force "androidx.activity:activity-ktx:1.10.1"
        force "androidx.core:core:1.16.0"
        force "androidx.core:core-ktx:1.16.0"
        force "androidx.fragment:fragment:1.8.6"
        force "androidx.fragment:fragment-ktx:1.8.6"
        force "androidx.webkit:webkit:1.12.1"
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:1.7.1"
    implementation "androidx.coordinatorlayout:coordinatorlayout:1.3.0"
    implementation "androidx.core:core-splashscreen:1.2.0"
    implementation project(':capacitor-android')
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.1.0"
    implementation "androidx.test:core:1.6.1"
    testImplementation "junit:junit:4.13.2"
}

apply from: 'capacitor.build.gradle'
